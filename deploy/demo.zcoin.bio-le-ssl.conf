<VirtualHost *:443>
    ServerName demo.biocrypt.net

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/demo.biocrypt.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/demo.biocrypt.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://192.168.88.7:3100/$1 [P,L]

    # Reverse proxy to dev server (same backend as biocrypt.net)
    ProxyPass / http://192.168.88.7:3100/
    ProxyPassReverse / http://192.168.88.7:3100/

    ErrorLog ${APACHE_LOG_DIR}/demo.biocrypt.net-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/demo.biocrypt.net-ssl-access.log combined
</VirtualHost>
