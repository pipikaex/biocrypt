<VirtualHost *:443>
    ServerName zcoin.bio
    ServerAlias www.zcoin.bio

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/zcoin.bio/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/zcoin.bio/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On

    # WebSocket support for gossip protocol
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://192.168.88.7:3100/$1 [P,L]

    # Reverse proxy to dev server
    ProxyPass / http://192.168.88.7:3100/
    ProxyPassReverse / http://192.168.88.7:3100/

    ErrorLog ${APACHE_LOG_DIR}/zcoin.bio-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/zcoin.bio-ssl-access.log combined
</VirtualHost>
