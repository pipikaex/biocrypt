<VirtualHost *:8080>
    ServerName biocrypt.net
    ServerAlias www.biocrypt.net

    ProxyPreserveHost On
    ProxyPass / http://192.168.88.7:3100/
    ProxyPassReverse / http://192.168.88.7:3100/

    ErrorLog ${APACHE_LOG_DIR}/biocrypt.net-error.log
    CustomLog ${APACHE_LOG_DIR}/biocrypt.net-access.log combined
</VirtualHost>
