<VirtualHost *:8080>
    ServerName zcoin.bio
    ServerAlias www.zcoin.bio

    ProxyPreserveHost On
    ProxyPass / http://192.168.88.7:3100/
    ProxyPassReverse / http://192.168.88.7:3100/

    ErrorLog ${APACHE_LOG_DIR}/zcoin.bio-error.log
    CustomLog ${APACHE_LOG_DIR}/zcoin.bio-access.log combined
</VirtualHost>
