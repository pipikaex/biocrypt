services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    expose:
      - "3000"
    volumes:
      - zcoin-data:/app/data
    environment:
      - PORT=3000
      - MINING_DIFFICULTY=0000
      - DATA_DIR=/app/data
      - NETWORK_FEE_RATE=0.1
    restart: unless-stopped

volumes:
  zcoin-data:
